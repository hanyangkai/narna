apiVersion: narna.ai/v1alpha1
kind: Constitution
metadata:
  id: const_487be269263249ee80174752a12dc4ac
  name: Mcp Agent Constitution
  version: 0.1.0
  entityKind: Agent
  entityId: agent_1e4b7d4bdabb473d970b292be0158d92
  owner: local
  createdAt: '2026-07-20T03:26:28.618750Z'
  license: MIT
spec:
  identity:
    id: agent_1e4b7d4bdabb473d970b292be0158d92
    owner: local
    version: 0.1.0
    trustProfile: vap-trust-v0
  capability:
    supports:
    - general
  permission:
    grants:
    - name: network
      mode: allow
  policy:
    ref: narna.ai/policy/default@0.1.0
    rules:
    - id: log_every_action
      effect: require
      evidence: action_log
    - id: human_for_irreversible
      effect: ask
      when: irreversible == true
  humanReview:
    requiredFor:
    - irreversible
    timeoutSeconds: 3600
    onTimeout: deny
  evidence:
    mustLog:
    - every_tool_call
    - every_policy_decision
    mustProve:
    - side_effects
    retentionDays: 90
    hashAlg: sha256
  trust:
    algorithm: vap-trust-v0
    minScore: 0.7
    inputs:
    - evidence
    - policy
    - execution
    - feedback
  governance:
    orgId: org_local
    fleetId: fleet_default
    roles:
    - operator
    - auditor
  compatibility:
    opentelemetry: true
    mcp: true
    openaiAgents: true
    langgraph: true
    crewai: true
