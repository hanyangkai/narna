name: Cloud CI

on:
  push:
    paths:
      - "src/**"
      - "web/backend/**"
      - "tests/**"
      - "pyproject.toml"
  pull_request:
    paths:
      - "src/**"
      - "web/backend/**"
      - "tests/**"
      - "pyproject.toml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]" || pip install -e .
      - name: Unit tests
        run: python -m unittest discover -s tests -v
