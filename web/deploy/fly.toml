app = "uap-cloud-api"
primary_region = "sin"

[build]
  dockerfile = "web/backend/Dockerfile"

[env]
  UAP_BILLING_MODE = "mock"
  UAP_RATE_LIMIT_PER_MIN = "120"
  UAP_CLOUD_CORS_ORIGIN = "*"
  # Set UAP_DATABASE_URL via fly secrets for production.

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

