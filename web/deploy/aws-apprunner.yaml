version: 1.0
runtime: docker
build:
  commands:
    build:
      - docker build -f web/backend/Dockerfile -t uap-cloud-api .
run:
  command: uvicorn app.main:app --host 0.0.0.0 --port 8000
  network:
    port: 8000
    env: PORT
  env:
    - name: UAP_BILLING_MODE
      value: mock
    - name: UAP_RATE_LIMIT_PER_MIN
      value: "120"
    - name: UAP_CLOUD_CORS_ORIGIN
      value: "*"

