# Production compose for VPS / Coolify
# Do not expose Postgres/Redis publicly — only API + Dashboard.

services:
  api:
    build:
      context: ../../..
      dockerfile: web/backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      UAP_DATABASE_URL: postgresql+psycopg2://uap:${POSTGRES_PASSWORD:-uap}@postgres:5432/uap_cloud
      UAP_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health', timeout=2).read()\""]
      interval: 15s
      timeout: 5s
      retries: 10
    ports:
      - "8000:8000"

  web:
    build:
      context: ../../..
      dockerfile: web/frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: uap
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uap}
      POSTGRES_DB: uap_cloud
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uap -d uap_cloud"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  redis_data:
