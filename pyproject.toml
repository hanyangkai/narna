[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "uap"
version = "0.1.0"
description = "UAP SDK (draft) — Understand · Act · Prove"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "UAP Contributors" }]
dependencies = [
  "PyYAML>=6.0.1",
  "jsonschema>=4.23.0",
  "cryptography>=42.0.0",
]

[project.scripts]
uap = "uap.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/uap", "src/uap_cloud"]

[tool.hatch.build.targets.wheel.force-include]
"specs/schemas" = "uap/_spec_schemas"
"policies" = "uap/_policies"

