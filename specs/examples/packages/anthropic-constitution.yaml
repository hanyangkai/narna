apiVersion: narna.ai/v1alpha1
kind: GovernancePackage
metadata:
  id: pkg_anthropic_constitution_stub
  name: Anthropic-style Constitution (stub)
  version: "3.0.0"
  provider: anthropic
  packageKind: Constitution
  license: MIT
  disclaimer: "Community stub for NARNA demos — not an official Anthropic publication."
  createdAt: "2026-07-16T00:00:00Z"
spec:
  supports:
    - anthropic-v2
    - anthropic-v3
  principles:
    - Be helpful, honest, and harmless.
    - Prefer refuse over unsafe compliance.
  riskLevel: medium
  evidence:
    mustProve:
      - tool.receipt
    mustLog:
      - policy.decision
  humanReview:
    requiredFor:
      - wallet.transfer
      - filesystem.delete
  rules:
    - id: deny-exfil
      effect: deny
      action: network.exfiltrate
      description: Block data exfiltration patterns
    - id: ask-wallet
      effect: ask
      action: wallet.transfer
      description: Require human for transfers
    - id: allow-research
      effect: allow
      action: research.query
      description: Allow research queries
