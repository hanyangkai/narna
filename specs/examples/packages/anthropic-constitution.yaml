apiVersion: narna.ai/v1alpha1
kind: GovernancePackage
metadata:
  id: pkg_anthropic_constitution_stub
  name: Anthropic-style Constitution (values pack)
  version: "3.1.0"
  provider: anthropic
  packageKind: Constitution
  license: MIT
  disclaimer: >-
    Community values pack inspired by public Constitutional AI themes.
    NOT a law, NOT an official Anthropic publication, NOT a compliance certification.
  createdAt: "2026-07-17T00:00:00Z"
  labels:
    jurisdiction: none
    instrument: values-charter
spec:
  supports:
    - anthropic-v2
    - anthropic-v3
  riskLevel: medium
  principles:
    - "Be helpful, honest, and harmless."
    - "Prefer refuse over unsafe compliance."
    - "This pack is a Constitution/values layer — pair with GDPR/EU AI Act/HIPAA for legal compliance."
  evidence:
    mustProve:
      - tool.receipt
    mustLog:
      - policy.decision
  humanReview:
    requiredFor:
      - wallet.transfer
      - filesystem.delete
  rules:
    - id: deny-exfil
      effect: deny
      action: network.exfiltrate
      description: Block data exfiltration patterns
    - id: ask-wallet
      effect: ask
      action: wallet.transfer
      description: Require human for transfers
    - id: allow-research
      effect: allow
      action: research.query
      description: Allow research queries
