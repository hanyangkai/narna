apiVersion: narna.ai/v1alpha1
kind: GovernancePackage
metadata:
  id: pkg_medical_v1
  name: Medical AI Constitution (stub)
  version: "1.0.0"
  provider: medical
  packageKind: Compliance
  license: MIT
  disclaimer: "Community stub for NARNA demos — not an official WHO/medical regulator publication."
  createdAt: "2026-07-16T00:00:00Z"
spec:
  supports:
    - medical-v1
    - medical-v3
  riskLevel: critical
  principles:
    - Do no harm.
    - Clinical decisions require qualified human review.
  evidence:
    mustProve:
      - tool.receipt
      - human.review
    retentionDays: 2555
  humanReview:
    requiredFor:
      - diagnosis.suggest
      - prescription.suggest
  rules:
    - id: deny-autonomous-prescription
      effect: deny
      action: prescription.autonomous
      description: No autonomous prescribing
    - id: ask-diagnosis
      effect: ask
      action: diagnosis.suggest
      description: Diagnosis suggestions require human review
    - id: deny-phi-exfil
      effect: deny
      action: phi.exfiltrate
      description: Block PHI exfiltration
