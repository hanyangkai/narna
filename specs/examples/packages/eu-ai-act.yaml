apiVersion: narna.ai/v1alpha1
kind: GovernancePackage
metadata:
  id: pkg_eu_ai_act_2024
  name: EU AI Act (Regulation 2024/1689)
  version: "2.0.0"
  provider: eu-ai-act
  packageKind: Compliance
  license: CC-BY-4.0
  disclaimer: >-
    Machine-enforceable mapping of Regulation (EU) 2024/1689 (Artificial Intelligence Act).
    Not an official EU publication. Not legal advice. Controllers remain responsible for
    conformity assessment, CE marking, and counsel review.
  createdAt: "2026-07-17T00:00:00Z"
  labels:
    jurisdiction: EU
    instrument: Regulation (EU) 2024/1689
    status: in-force-phased
spec:
  supports:
    - eu-ai-act-v1
    - eu-ai-act-2024
  legalBasis:
    title: Artificial Intelligence Act
    citation: Regulation (EU) 2024/1689 of the European Parliament and of the Council
    jurisdiction: European Union
    officialUrl: https://eur-lex.europa.eu/eli/reg/2024/1689/oj
  riskLevel: high
  principles:
    - "Prohibited AI practices must not be placed on the market or put into service (Art. 5)."
    - "High-risk AI systems require risk management, data governance, logging, transparency, human oversight, and accuracy (Arts. 8–15)."
    - "Transparency obligations for certain AI systems interacting with natural persons (Art. 50)."
    - "General-purpose AI models have documentation and systemic-risk duties (Arts. 51–55)."
  evidence:
    mustProve:
      - tool.receipt
      - policy.decision
      - human.review
    mustLog:
      - agent.action
      - model.inference
      - human.override
    retentionDays: 2555
  humanReview:
    requiredFor:
      - decision.consequential
      - biometric.identification
      - employment.decision
      - credit.scoring
      - law.enforcement.assist
      - wallet.transfer
  constraints:
    - "No social scoring of natural persons by public authorities (Art. 5(1)(c))."
    - "No untargeted scraping of facial images from internet/CCTV to build recognition DBs (Art. 5(1)(e))."
    - "No emotion recognition in workplace/education except medical/safety exceptions (Art. 5(1)(f))."
  rules:
    - id: art5-deny-social-scoring
      effect: deny
      action: social.scoring
      description: "Art. 5(1)(c) — Prohibit social scoring of natural persons"
    - id: art5-deny-biometric-scraping
      effect: deny
      action: biometric.scrape
      description: "Art. 5(1)(e) — Prohibit untargeted facial-image scraping for recognition DBs"
    - id: art5-deny-emotion-workplace
      effect: deny
      action: emotion.recognition.workplace
      description: "Art. 5(1)(f) — Prohibit emotion recognition in workplace/education (default deny)"
    - id: art5-deny-subliminal-manipulation
      effect: deny
      action: manipulation.subliminal
      description: "Art. 5(1)(a) — Prohibit subliminal / deceptive manipulation causing significant harm"
    - id: art5-deny-exploit-vulnerability
      effect: deny
      action: exploit.vulnerability
      description: "Art. 5(1)(b) — Prohibit exploiting vulnerabilities of age/disability groups"
    - id: art5-ask-real-time-remote-biometric
      effect: ask
      action: biometric.identification.remote.realtime
      description: "Art. 5(1)(h) — Real-time remote biometric ID in public spaces — human/legal gate"
    - id: art14-require-human-oversight-high-risk
      effect: require
      action: decision.consequential
      description: "Art. 14 — Human oversight for high-risk AI system outputs"
    - id: art12-require-logging
      effect: require
      action: model.inference
      when: risk.high
      description: "Art. 12 — Automatic logging of events over system lifetime"
    - id: art50-require-ai-disclosure
      effect: require
      action: user.interact
      description: "Art. 50 — Disclose that the user is interacting with an AI system (unless obvious)"
    - id: art15-deny-unguarded-high-risk-deploy
      effect: deny
      action: highrisk.deploy
      when: evidence.missing
      description: "Arts. 8–15 — Block high-risk deploy without risk mgmt / evidence chain"
